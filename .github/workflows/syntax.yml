name: Syntax checks

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: python -m py_compile ids_streaming.py mininet_attack.py gen_schema.py

      - name: Check shell syntax
        run: bash -n capture.sh pcap_to_csv.sh run_live_detection.sh

